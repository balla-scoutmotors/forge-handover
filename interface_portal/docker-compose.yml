services:
  ollama:
    image: ollama/ollama:latest
    container_name: sandbox-ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    volumes:
      - /home/ubuntu/.ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=8h
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=1
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - ai-stack

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sandbox-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - ai-stack

  embed-worker:
    build:
      context: ./embed-worker
      dockerfile: Dockerfile
    container_name: sandbox-embed-worker
    restart: always
    env_file:
      - .env
    depends_on:
      - qdrant
      - ollama
    networks:
      - ai-stack

  dashboard:
    build:
      context: ./dashboard-frontend
      dockerfile: Dockerfile
    container_name: sandbox-dashboard
    restart: always
    ports:
      - "0.0.0.0:8501:8501"
    env_file:
      - .env
    environment:
      - TZ=America/New_York
    depends_on:
      - qdrant
      - ollama
    networks:
      - ai-stack

  qdrant-purge:
    build:
      context: ./qdrant-purge
      dockerfile: Dockerfile
    container_name: sandbox-qdrant-purge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PURGE_RETENTION_HOURS=720
      - PURGE_INTERVAL_HOURS=24
    depends_on:
      - qdrant
    networks:
      - ai-stack

volumes:
  qdrant-data:

networks:
  ai-stack:
    driver: bridge